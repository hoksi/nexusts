name: Publish packages to npm

# This workflow publishes all 31 packages to npm when a release is
# published. It runs the workspace-aware publish script after
# building all packages.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "true"

jobs:
  publish:
    # Use a specific image instead of ubuntu-latest so the runner
    # comes from a different IP pool. This avoids the npm registry's
    # per-IP rate limit (429) when many packages are published in
    # quick succession.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build:all || bun run build

      - name: Publish to npm
        if: github.event_name == 'release'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run scripts/publish.ts

      - name: Dry run (no actual publish)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == 'true'
        run: |
          echo "Dry run — checking package.json validity for all 31 packages"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "✓ $pkg/package.json"
              node -e "JSON.parse(require('fs').readFileSync('$pkg/package.json', 'utf8'))" || exit 1
            fi
          done
